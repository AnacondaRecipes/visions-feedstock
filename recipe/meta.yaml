{% set name = "visions" %}
{% set version = "0.8.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 37f55c37d7bcf124054e612850b28a4f0bab9b200733cedd8f1781c3ac5cc3f0

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv --no-build-isolation
  skip: True # [py<38]

requirements:
  host:
    - pip
    - python
    - wheel
    - setuptools >=61.0.0
  run:
    - python
    - numpy >=1.23.2
    - pandas >=2.0.0
    - attrs >=19.3.0
    - networkx >=2.4
    - multimethod >=1.4
    - puremagic

test:
  source_files:
    - pytest.ini
    - tests
  imports:
    - visions
  commands:
    - pip check
    - pytest -v -m "not spark_test"
  requires:
    - pip
    - pytest >=5.2.0
    - shapely
    - pillow
    - imagehash

about:
  home: https://github.com/dylan-profiler/visions
  summary: Type System for Data Analysis in Python
  license: BSD-4-Clause
  license_family: BSD
  license_file: LICENSE
  description: |
    Visions provides an extensible suite of tools to support common data analysis operations including
    type inference on unknown data, casting data types and automated data summarization.
  doc_url: https://dylan-profiler.github.io/visions/
  dev_url: https://github.com/dylan-profiler/visions

extra:
  recipe-maintainers:
    - philip-khor
